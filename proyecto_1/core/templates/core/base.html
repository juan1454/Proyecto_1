{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Generador de Documentos{% endblock %}</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'core/css/modern.css' %}">
</head>
<body>
    <div class="bg-animation">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <!-- Navegación -->
    {% if user.is_authenticated %}
    <nav class="navbar glassmorphism">
        <div class="nav-brand">
            <span class="brand-icon">📄</span> <span class="brand-text">DocGenerator</span>
        </div>
        <div class="nav-links">
            {% if request.user.is_superuser %}
            <a href="{% url 'admin:index' %}" class="nav-link">Panel Admin</a>
            {% endif %}
            
            <form method="post" action="{% url 'logout' %}" class="inline-form">
                {% csrf_token %}
                <button type="submit" class="btn btn-logout">Cerrar Sesión</button>
            </form>
        </div>
    </nav>
    {% endif %}

    <!-- Contenido Principal -->
    <main class="main-container">
        {% block content %}
        {% endblock content %}
    </main>
</body>
</html>
